# =====================================================
# DOCKER COMPOSE - NESTJS + NGINX FRONT API
# =====================================================
# Stack Overview:
# - NestJS API
# - Nginx reverse proxy
# =====================================================

name: nestjs-incorr

x-nginx-image: &nginx-image nginx:1.31.1-alpine@sha256:8b1e78743a03dbb2c95171cc58639fef29abc8816598e27fb910ed2e621e589a

networks:
  bloomn-etword:
    external: true


services:
# =====================================================
# NESTJS BACKEND APPLICATION
# =====================================================
  nestjs-webapi-io:
    build: .
    container_name: ${APP_NAME}_nestjs-webapi-io
    restart: always
    ports:
      - ${NESTJS_WEBAPI_IO_PORT}:3000
    working_dir: /var/www/app
    volumes:
      # Source code bind mount (dev-friendly)
      - ./app:/var/www/app
    env_file: .env
    networks:
      - bloomn-etword

# =====================================================
# NGINX REVERSE PROXY
# =====================================================
  nginxe-server-be:
    image: *nginx-image
    container_name: ${APP_NAME}_nginxe-server-be
    restart: always
    ports:
      - ${NGINXE_SERVER_BE_PORT}:80
    volumes:
      # Nginx configuration
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    env_file: .env
    depends_on:
      - nestjs-webapi-io
    networks:
      - bloomn-etword
