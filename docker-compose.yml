# =====================================================
# DOCKER COMPOSE - NESTJS + NGINX FRONT API
# =====================================================
# Stack:
# - NestJS API
# - Nginx reverse proxy
# =====================================================

version: "3.9"

networks:
  nest-cluster:
    external: true


services:

# =====================================================
# NESTJS BACKEND APPLICATION
# =====================================================
  nest-app:
    build: .
    container_name: ${APP_NAME}_API
    restart: always

    ports:
      - "3000:3000"

    environment:
      # MongoDB connection string (via mongos router)
      - MONGO_URI=mongodb://${MONGO_ADMIN_CONFIG_SV}:${MONGO_PASSWORD_CONFIG_SV}@mongo-router:27017/nestdb?authSource=admin

    working_dir: /var/www/app

    volumes:
      # Source code bind mount (dev-friendly)
      - ./app:/var/www/app

    env_file:
      - .env

    networks:
      - nest-cluster


# =====================================================
# NGINX REVERSE PROXY
# =====================================================
  nginx:
    image: nginx:alpine
    container_name: ${APP_NAME}_nginx_fAPI
    restart: always

    ports:
      - "80:80"

    volumes:
      # Nginx configuration
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    env_file:
      - .env

    depends_on:
      - nest-app

    networks:
      - nest-cluster
