# =====================================================
# DOCKER COMPOSE - NuxtJS + NGINX FRONT API
# =====================================================
# Stack Overview:
# - NuxtJS API
# - Nginx reverse proxy
# =====================================================

name: nuxtjs-incorr

x-nginx-image: &nginx-image nginx:1.31.1-alpine@sha256:8b1e78743a03dbb2c95171cc58639fef29abc8816598e27fb910ed2e621e589a

networks:
  bloomn-etword:
    external: true

services:
# =====================================================
# NuxtJS BACKEND APPLICATION
# =====================================================
  nuxtjs-webgui-io:
    build: .
    container_name: ${APP_NAME}_nuxtjs-webgui-io
    # restart: always
    ports:
      - ${NUXTJS_WEBAPI_IO_PORT}:3000
    working_dir: /var/www/app
    volumes:
      # Source code bind mount (dev-friendly)
      - ./source:/var/www/app
    env_file: .env
    networks:
      - bloomn-etword

# =====================================================
# NGINX REVERSE PROXY
# =====================================================
  nginxe-server-fe:
    image: *nginx-image
    container_name: ${APP_NAME}_nginxe-server-fe
    restart: always
    ports:
      - ${NGINXE_SERVER_FE_PORT}:80
    volumes:
      # Nginx configuration
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    env_file: .env
    depends_on:
      - nuxtjs-webgui-io
    networks:
      - bloomn-etword
